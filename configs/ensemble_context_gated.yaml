# Context-gated ensemble configuration for regime-routed backtesting
# Extends regime_routed_v1 with daily context gate for threshold adjustment
name: context_gated_v1
description: >-
  Context-gated ensemble: regime classifier + daily context classifier gate
  routing to per-regime signal models. Context adjusts signal thresholds —
  aligned trades get lower thresholds, counter-trend trades get higher.

models:
  regime:
    model_path: models/regime_classifier_seed/1h_latest
    output_type: regime_classification

  context:
    model_path: models/context_classifier_seed/1d_latest
    output_type: context_classification

  trend_signal:
    model_path: models/mean_reversion_momentum_v1/1h_latest
    output_type: classification

  range_signal:
    model_path: models/bb_stochastic_mean_reversion_eurusd_1h_v1/1h_latest
    output_type: classification

composition:
  type: regime_route
  gate_model: regime
  context_gate: context
  regime_threshold: 0.4
  stability_bars: 3

  context_modifiers:
    aligned_discount: 0.2
    counter_premium: 0.3
    neutral_effect: 0.05

  rules:
    trending_up:
      model: trend_signal
    trending_down:
      model: trend_signal
    ranging:
      model: range_signal
    volatile:
      action: FLAT
  on_regime_transition: close_and_switch
