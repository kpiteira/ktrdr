# =============================================================================
# TB CLASSIFICATION REGIME-ONLY ENSEMBLE
# =============================================================================
# Ensemble using triple-barrier-trained classification signal models with
# Gaussian MFs + hybrid encoding. No context gate — baseline for comparison.
#
# Architecture:
#   regime_classifier (4-class) → route to per-regime TB signal model
#   trend_tb_signal → classification signal for trending regimes
#   range_tb_signal → classification signal for ranging regimes
#
# Signal models trained with:
#   - Triple barrier labels (BUY/HOLD/SELL)
#   - Gaussian membership functions (no dead zones)
#   - Hybrid encoding (fuzzy + raw indicator values)
#   - Focal loss + early stopping + gradient clipping
# =============================================================================

name: tb_regime_only
description: >-
  Regime-only ensemble with TB classification signal models. No context gate.
  Baseline for comparison against context-gated variant and forward-return
  regression models.

models:
  regime:
    model_path: models/regime_classifier_seed/1h_latest
    output_type: regime_classification

  trend_signal:
    model_path: models/trend_tb_gaussian_signal_v1/1h_latest
    output_type: classification

  range_signal:
    model_path: models/range_tb_signal_v1/1h_latest
    output_type: classification

composition:
  type: regime_route
  gate_model: regime
  regime_threshold: 0.4
  stability_bars: 3

  allow_short_from_flat: true

  rules:
    trending_up:
      model: trend_signal
    trending_down:
      model: trend_signal
    ranging:
      model: range_signal
    volatile:
      action: FLAT
  on_regime_transition: close_and_switch
