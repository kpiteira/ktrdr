# Container version — uses /app/models paths
name: tb_regime_only
description: >-
  Regime-only ensemble with TB classification signal models (container paths).

models:
  regime:
    model_path: /app/models/regime_classifier_seed/1h_latest
    output_type: regime_classification

  trend_signal:
    model_path: /app/models/trend_tb_gaussian_signal_v1/5m_latest
    output_type: classification

  range_signal:
    model_path: /app/models/range_tb_signal_v1/1h_latest
    output_type: classification

composition:
  type: regime_route
  gate_model: regime
  regime_threshold: 0.4
  stability_bars: 3

  allow_short_from_flat: true

  rules:
    trending_up:
      model: trend_signal
    trending_down:
      model: trend_signal
    ranging:
      model: range_signal
    volatile:
      action: FLAT
  on_regime_transition: close_and_switch
