name: regression_example
version: "3.0"
description: >
  Example regression strategy. Predicts forward returns using
  RSI and MACD fuzzy inputs with cost-aware trading thresholds.

training_data:
  symbols:
    mode: single
    symbol: EURUSD
  timeframes:
    mode: single
    timeframe: 1h
  date_range:
    start: "2024-01-01"
    end: "2025-03-01"

indicators:
  rsi_14:
    type: rsi
    period: 14
  macd_12_26_9:
    type: macd
    fast: 12
    slow: 26
    signal: 9

fuzzy_sets:
  rsi_oversold:
    indicator: rsi_14
    oversold: [20, 30, 40]
  rsi_overbought:
    indicator: rsi_14
    overbought: [60, 70, 80]
  macd_bullish:
    indicator: macd_12_26_9.line
    bullish: [-0.005, 0, 0.005]
  macd_bearish:
    indicator: macd_12_26_9.line
    bearish: [-0.005, 0, 0.005]

nn_inputs:
  - fuzzy_set: rsi_oversold
    timeframes: all
  - fuzzy_set: rsi_overbought
    timeframes: all
  - fuzzy_set: macd_bullish
    timeframes: all
  - fuzzy_set: macd_bearish
    timeframes: all

model:
  type: mlp
  architecture:
    hidden_layers: [64, 32]
    dropout: 0.2
    activation: relu

decisions:
  output_format: regression
  cost_model:
    round_trip_cost: 0.003
    min_edge_multiplier: 1.5
  position_awareness: true
  filters:
    min_signal_separation: 4

training:
  labels:
    source: forward_return
    horizon: 20
  loss: huber
  huber_delta: 0.01
  epochs: 50
  learning_rate: 0.001
