# =============================================================================
# V3 STRATEGY: Multi-Timeframe Test (1h + 1d)
# =============================================================================
# E2E test strategy for multi-timeframe training and backtesting.
# Uses only 1h + 1d — timeframes with known cached data.
# =============================================================================

name: v3_multi_tf_test
version: "3.0"
description: RSI across 1h and 1d for multi-TF E2E validation

training_data:
  symbols:
    mode: single
    symbol: EURUSD
  timeframes:
    mode: multi_timeframe
    list:
      - "1h"
      - "1d"
    base_timeframe: "1h"
  history_required: 200

indicators:
  rsi_14:
    type: rsi
    period: 14
    source: close

fuzzy_sets:
  rsi_14:
    indicator: rsi_14
    oversold:
      type: triangular
      parameters: [0, 30, 40]
    neutral:
      type: triangular
      parameters: [35, 50, 65]
    overbought:
      type: triangular
      parameters: [60, 70, 100]

nn_inputs:
  - fuzzy_set: rsi_14
    timeframes: all

model:
  type: mlp
  architecture:
    hidden_layers: [64, 32]
    activation: relu
    output_activation: softmax
    dropout: 0.3
  features:
    include_price_context: false
    lookback_periods: 2
    scale_features: true
  training:
    learning_rate: 0.001
    batch_size: 32
    epochs: 50
    optimizer: adam
    early_stopping:
      enabled: true
      patience: 10
      min_delta: 0.001

decisions:
  output_format: classification
  confidence_threshold: 0.6
  position_awareness: true

training:
  method: supervised
  labels:
    source: zigzag
    zigzag_threshold: 0.025
    label_lookahead: 20
  data_split:
    train: 0.7
    validation: 0.15
    test: 0.15
